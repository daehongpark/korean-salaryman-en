name: 매일 자동 글 생성

on:
  schedule:
    - cron: '17 0 * * *'   # 09:17 KST 1차 시도 (정각 부하 회피)
    - cron: '47 0 * * *'   # 09:47 KST 폴백 (1차 스킵 시)
  workflow_dispatch:
    inputs:
      auto_publish:
        description: '자동 발행 여부 (true=즉시발행 / false=임시저장)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      posts_per_day:
        description: '오늘 생성할 글 수 (기본 5)'
        required: false
        default: '5'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # hang 시 6시간 러너 낭비 방지 (정상 5편 ≈ 60분)

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 한글 폰트 설치 (썸네일용)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: 패키지 설치
        run: pip install requests python-dotenv Pillow

      - name: .env 파일 생성
        run: |
          # workflow_dispatch 수동 실행 시 입력값 우선, 없으면 Secrets 값 사용
          AUTO_PUBLISH_VAL="${{ github.event.inputs.auto_publish || secrets.AUTO_PUBLISH || 'false' }}"
          POSTS_PER_DAY_VAL="${{ github.event.inputs.posts_per_day || secrets.POSTS_PER_DAY || '5' }}"

          # 기본 설정
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"           >> .env
          echo "BLOG_TITLE=${{ secrets.BLOG_TITLE }}"                   >> .env
          echo "AUTO_PUBLISH=${AUTO_PUBLISH_VAL}"                       >> .env
          echo "POSTS_PER_DAY=${POSTS_PER_DAY_VAL}"                     >> .env
          echo "UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}" >> .env

          # 네이버 개발자센터 API (데이터랩, 블로그 검색)
          echo "NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}"         >> .env
          echo "NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}" >> .env

          # 네이버 검색광고 API (SEO 월 검색량 - 핵심)
          echo "NAVER_AD_API_KEY=${{ secrets.NAVER_AD_API_KEY }}"       >> .env
          echo "NAVER_AD_SECRET_KEY=${{ secrets.NAVER_AD_SECRET_KEY }}" >> .env
          echo "NAVER_CUSTOMER_ID=${{ secrets.NAVER_CUSTOMER_ID }}"    >> .env

          # 부동산 공공 API (미구현 모듈 대비 선제 매핑)
          echo "APT_RENT_API_KEY=${{ secrets.APT_RENT_API_KEY }}" >> .env
          echo "APT_TRADE_API_KEY=${{ secrets.APT_TRADE_API_KEY }}" >> .env
          echo "OFFICETEL_RENT_API_KEY=${{ secrets.OFFICETEL_RENT_API_KEY }}" >> .env

          # 청년정책 / 금융 / 통계 API
          echo "YOUTH_POLICY_API_KEY=${{ secrets.YOUTH_POLICY_API_KEY }}" >> .env
          echo "YOUTH_PLAN_API_KEY=${{ secrets.YOUTH_PLAN_API_KEY }}" >> .env
          echo "YOUTH_CONTENT_API_KEY=${{ secrets.YOUTH_CONTENT_API_KEY }}" >> .env
          echo "FINANCE_LOAN_API_KEY=${{ secrets.FINANCE_LOAN_API_KEY }}" >> .env
          echo "KSED_API_KEY=${{ secrets.KSED_API_KEY }}" >> .env

          # 블로그 메타
          echo "BLOG_URL=${{ secrets.BLOG_URL }}" >> .env
          # ADMIN_PASSWORD, ADMIN_PORT는 로컬 전용이라 매핑 제외

          echo "설정 확인:"
          echo "  AUTO_PUBLISH  = ${AUTO_PUBLISH_VAL}"
          echo "  POSTS_PER_DAY = ${POSTS_PER_DAY_VAL}"
          echo "  검색광고 API  = ${{ secrets.NAVER_AD_API_KEY != '' && 'ON' || 'OFF' }}"

      - name: 글 자동 생성 실행
        run: python automation.py
        env:
          # .env 외에 환경변수로도 전달 (이중 안전장치)
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_AD_API_KEY:    ${{ secrets.NAVER_AD_API_KEY }}
          NAVER_AD_SECRET_KEY: ${{ secrets.NAVER_AD_SECRET_KEY }}
          NAVER_CUSTOMER_ID:   ${{ secrets.NAVER_CUSTOMER_ID }}

      - name: 정적 글 페이지 생성
        run: python generate_static_posts.py

      - name: sitemap.xml 갱신
        run: python generate_sitemap.py

      - name: GitHub에 자동 업로드
        run: |
          git config user.name  "자동 글 생성"
          git config user.email "pride93d@gmail.com"
          # posts 폴더 전체 (thumbnails 포함) 추가
          git add posts/ sitemap.xml p/
          git diff --staged --quiet || git commit -m "자동 글 생성: $(date +'%Y-%m-%d') [AUTO_PUBLISH=${{ github.event.inputs.auto_publish || secrets.AUTO_PUBLISH || 'false' }}]"
          git push
