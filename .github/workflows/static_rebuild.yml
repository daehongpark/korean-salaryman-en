name: 정적 페이지 재생성
on:
  push:
    branches: [main]
    paths:
      - 'posts/**.json'
  workflow_dispatch:   # 수동 실행 — 누락 썸네일 백필/정적 재생성용
jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 한글 폰트 설치 (썸네일용)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
      - name: 패키지 설치
        run: pip install requests python-dotenv Pillow
      - name: 누락 썸네일 백필 (admin 주제글/에세이 — Vercel FS 우회)
        run: python backfill_thumbnails.py
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          BLOG_TITLE:          ${{ secrets.BLOG_TITLE }}
      - name: 정적 페이지 + sitemap 재생성
        run: |
          python generate_static_posts.py
          python generate_sitemap.py
      - name: 변경분 push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ p/ sitemap.xml archive.html
          git diff --staged --quiet || git commit -m "정적 페이지 재생성 [skip ci]"
          git push
