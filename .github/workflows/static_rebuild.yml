name: 정적 페이지 재생성
on:
  push:
    branches: [main]
    paths:
      - 'posts/**.json'
jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 정적 페이지 + sitemap 재생성
        run: |
          python generate_static_posts.py
          python generate_sitemap.py
      - name: 변경분 push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add p/ sitemap.xml posts/manifest.json archive.html
          git diff --staged --quiet || git commit -m "정적 페이지 재생성 [skip ci]"
          git push
