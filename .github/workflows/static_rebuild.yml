name: 정적 페이지 재생성
on:
  push:
    branches: [main]
    paths:
      - 'posts/**.json'
  workflow_dispatch:   # 수동 실행 — 누락 썸네일 백필/정적 재생성용

# 동시 실행 직렬화 — 같은 그룹은 한 번에 하나만. 앞 실행을 죽이지 않고(false)
# 큐에 대기시켜 모든 발행분이 순서대로 처리되게 함 → push 경쟁 원천 제거.
concurrency:
  group: static-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 한글 폰트 설치 (썸네일용)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
      - name: 패키지 설치
        run: pip install requests python-dotenv Pillow
      - name: 누락 썸네일 백필 (admin 주제글/에세이 — Vercel FS 우회)
        run: python backfill_thumbnails.py
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          BLOG_TITLE:          ${{ secrets.BLOG_TITLE }}
      - name: 정적 페이지 + sitemap 재생성
        run: |
          python generate_static_posts.py
          python generate_sitemap.py
      - name: 변경분 push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ p/ sitemap.xml archive.html
          git diff --staged --quiet && echo "변경 없음, 종료" && exit 0
          git commit -m "정적 페이지 재생성 [skip ci]"
          # concurrency가 대부분 막지만, 이중 안전망: pull --rebase 후 push 5회 재시도
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && echo "push 성공 (시도 $i)" && exit 0
            echo "push 재시도 $i 실패, 재시도..."
            sleep 3
          done
          echo "5회 재시도 후에도 push 실패" && exit 1
